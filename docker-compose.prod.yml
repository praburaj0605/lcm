# Production-style stack: API + nginx static + Postgres + Redis (no source bind mounts).
# Build web with same-origin API (nginx proxies /api → api).
#
#   docker compose -f docker-compose.prod.yml up --build
#   Open http://localhost

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: logistics
      POSTGRES_PASSWORD: logistics
      POSTGRES_DB: logistics
    volumes:
      - pg_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U logistics -d logistics"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data_prod:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://logistics:logistics@postgres:5432/logistics
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET:-dev-only-change-in-production}
      CORS_ORIGINS: http://localhost,http://127.0.0.1
      AUTH_ALLOW_EMAIL_ONLY: "true"
      BREVO_API_KEY: ${BREVO_API_KEY:-}
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        VITE_API_BASE_URL: ""
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  pg_data_prod:
  redis_data_prod:
